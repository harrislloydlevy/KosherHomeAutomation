substitutions:
  name: standalone-shabbosclock
  friendly_name: "Standalone ShabbosClock"
  api_key: !secret api_key
  ota_password: !secret ota_password
  ap_password: !secret ap_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

packages:
  board: !include ./board.yaml

http_request:

script:
  - id: get_jdate
    mode: restart
    then:
      - http_request.get:
            max_response_buffer_size: 8192
            url: !lambda |-
                  char buf[256];
                  auto time = id(sntp_time).now();
                  auto end_time = id(sntp_time).now();

                  // Yes this is the best way to do this. ESPTime struct doesn't
                  // have many helper funcs.
                  for (int i = 0; i < 7; i++) {
                    end_time.increment_day();
                  }

                  const char *url_fmt = "http://www.hebcal.com/hebcal?v=1&cfg=json&"
                                        "maj=on&" 
                                        "min=on&"
                                        "mod=on&"
                                        "nx=on&"
                                        "D=on&"
                                        "ss=on&"
                                        "mf=on&"
                                        "c=on&"
                                        "geo=geoname&"
                                        "M=on&"
                                        "s=on&"
                                        "geonameid=%d"
                                        "&start=%04d-%02d-%02d&end=%04d-%02d-%02d";
                  snprintf(buf, 256, url_fmt, 2147714, time.year, time.month, time.day_of_month, end_time.year, end_time.month, end_time.day_of_month);
                  ESP_LOGI("url", buf);
                  return buf;
            capture_response: true
            on_response:
              then:
                - if:
                    condition:
                        lambda: return response->status_code == 200;
                    then:
                        - lambda: |-
                            // Size estimates from: https://arduinojson.org/v6/assistant/#/step1 and doubled.
                            #define JSON_GET(obj, key) ((obj)key | "")
                            #define JSON_DBG(obj, key) ESP_LOGI("json", "%s: %s", #key, JSON_GET(obj, key))
                            bool printed_date = false;
                            ESP_LOGI("http_body", "Content Length: %d", response->content_length);
                            ESP_LOGI("http_body", "Body Length: %d", body.length());
                            ESP_LOGI("http_body", body.c_str());
                            JsonDocument doc;
                            deserializeJson(doc, body);
                            JSON_DBG(doc, ["location"]["city"]);
                            JSON_DBG(doc, ["items"][0]["hdate"]);

                            const char *city = JSON_GET(doc, ["location"]["city"]);
                            const char *hdate = JSON_GET(doc, ["items"][0]["hdate"]);

                            // How is the str_sprintf not a memory leak here? C++ and std::str freaks me out still.
                            lv_textarea_set_text(head_text, str_sprintf("%s / %s", city, hdate).c_str());

                            // Now we print upcoming events.
                            JsonArray events = doc["items"];

                            for (JsonObject obj : events ) {
                              const char *cat = JSON_GET(doc, ["category"]);

                              if (cat == "hebdate" && !printed_date) {
                                JSON_DBG(obj, ["hdate"]);
                                const char *hy = JSON_GET(obj, ["heDateParts"]["y"]);
                                const char *hm = JSON_GET(obj, ["heDateParts"]["m"]);
                                const char *hd = JSON_GET(obj, ["heDateParts"]["d"]);

                                ESP_LOGI("json", "Hebrew Date %s / %s / %s", hy, hm, hd);

                                printed_date = true;
                              } else if (cat == "holiday") {

                              } else if (cat == "candles") {
                              } else if (cat == "havdalah") {
                              } else if (cat == "parshat") {
                              }

                            }
                    else:
                        - logger.log:
                            format: "Error: Response status: %d, message %s"
                            args: [ 'response->status_code', 'body.c_str()' ]

# ============================================================ 
# ESPHome YAML start
#

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

logger:

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Shabbos Clock Setup"

captive_portal:

time:
  - platform: sntp
    timezone: "Australia/Sydney"
    id: sntp_time
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    on_time:
      - seconds: 0
        hours: /12
        then:
          - script.execute: get_jdate
    on_time_sync:
      then:
        - script.execute: get_jdate

lvgl:
  displays: [main_display]
  touchscreens: [main_touchscreen]
  pages:
    - id: main_page
      widgets:
        - label:
            align: top_mid
            id: head_text 
            y: 8
            text: "ES3C28P Demo"
        - label:
            id: battery_label
            align: top_right
            x: -8
            y: 8
            text: "--V"
        - textarea:
            id: main_text
            align: top_left
            x: 8
            y: 32
          

# gET CODES FROM: https://pictogrammers.github.io/@mdi/font/7.4.47/
font:
  - file: "gfonts://Roboto"
    id: alef
    size: 20
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi
    size: 32
    glyphs:
      - "\U000F140B" # Lightning bolt
      - "\U000F05e2" # Menorah
      - "\U000F059B" # Sunset
      - "\U000F1B04" # Synagogue
      - "\U000F097A" # Magen David
      - "\U000F1CCC" # Book
      - "\U000F00EE" # Empty Calendar
      - "\U000F0241" # Flash Symbol

  # Need a smaller version to fit inside the calendar
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_small
    size: 18
    glyphs:
      - "\U000F097A" # Magen David

image:
  - file: background.png
    id: background
    resize: 320x240
    type: RGB565
